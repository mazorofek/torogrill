services:
  - type: web
    name: torogrill-api
    plan: free
    runtime: node
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build:api
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
